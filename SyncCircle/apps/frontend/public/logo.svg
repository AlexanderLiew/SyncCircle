<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8a4d4" />
      <stop offset="100%" stop-color="#7c5cbf" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f4b8d0" />
      <stop offset="100%" stop-color="#e05a9a" />
    </linearGradient>
    <linearGradient id="overlapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8a4d4" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#f4b8d0" stop-opacity="0.3" />
    </linearGradient>
  </defs>
  <!-- Tilted group for dynamic feel -->
  <g transform="rotate(-12, 60, 60)">
    <!-- Left circle - slightly up -->
    <circle cx="42" cy="55" r="30" fill="none" stroke="url(#grad1)" stroke-width="5.5" stroke-linecap="round" />
    <!-- Right circle - slightly down -->
    <circle cx="78" cy="65" r="30" fill="none" stroke="url(#grad2)" stroke-width="5.5" stroke-linecap="round" />
    <!-- Overlap fill -->
    <path d="M58.5 39 A30 30 0 0 1 63 90 A30 30 0 0 1 58.5 39" fill="url(#overlapGrad)" />
  </g>
  <!-- Accent dot top-right for energy -->
  <circle cx="98" cy="22" r="4" fill="#f4b8d0" opacity="0.7" />
  <circle cx="90" cy="14" r="2.5" fill="#b8a4d4" opacity="0.5" />
</svg>
